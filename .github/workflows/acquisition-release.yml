name: WeaveStudio Acquisition Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*-acquisition'

permissions:
  contents: read

concurrency:
  group: weavestudio-acquisition-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-and-package:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out closing source
        uses: actions/checkout@v6

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run buyer verification gate
        run: npm run verify:buyer

      - name: Generate CycloneDX SBOM
        run: npm sbom --sbom-format=cyclonedx --sbom-type=application > release/weavestudio-sbom.cdx.json

      - name: Write release summary
        shell: bash
        run: |
          {
            echo '# WeaveStudio Acquisition Release Summary'
            echo
            echo "- Repository: $GITHUB_REPOSITORY"
            echo "- Commit: $GITHUB_SHA"
            echo "- Ref: $GITHUB_REF"
            echo "- Workflow run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo "- Generated UTC: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "- Node: $(node --version)"
            echo "- npm: $(npm --version)"
            echo
            echo '## Artifact inventory before checksums'
            echo
            find release -type f -printf '%P\n' | sort | sed 's/^/- `/' | sed 's/$/`/'
            echo
            echo 'The source ZIP is generated by the deterministic package script. The SBOM, checksum inventory, and this summary are closing evidence outside that ZIP.'
          } > release/RELEASE_SUMMARY.md

      - name: Generate SHA-256 inventory
        shell: bash
        run: |
          find release -type f ! -name SHA256SUMS.txt -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            > release/SHA256SUMS.txt
          cat release/SHA256SUMS.txt

      - name: Upload private acquisition artifact
        uses: actions/upload-artifact@v5
        with:
          name: weavestudio-acquisition-${{ github.sha }}
          path: release/**
          if-no-files-found: error
          retention-days: 30
