name: WeaveStudio CI

on:
  push:
    branches: [main, master, hardening/**]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: weavestudio-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:browser
      - run: npm run package:acquisition
